<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Federico's Gröna Bandet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #111;
      color: white;
      padding: 12px;
      text-align: center;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h2>My GPX Routes Viewer</h2>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>
  const map = L.map('map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const gpxFiles = [
    "stage1_route.gpx",
    "stage2_route.gpx",
    "stage2_alt_route.gpx",
    "stage3_route.gpx",
    "stage1_resupply.gpx",
    "stage2_resupply.gpx",
    "stage2_alt_resupply.gpx",
    "stage3_resupply.gpx",
    
  ];

  let bounds = [];

  gpxFiles.forEach(file => {
    new L.GPX(file, {
      async: true,
      marker_options: {
        startIconUrl: null,
        endIconUrl: null,
        shadowUrl: null
      }
    }).on('loaded', function(e) {
      bounds.push(e.target.getBounds());
      if (bounds.length === gpxFiles.length) {
        let group = L.featureGroup(bounds.map(b => L.rectangle(b)));
        map.fitBounds(group.getBounds());
      }
    }).addTo(map);
  });
</script>

</body>
</html>
