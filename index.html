<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Federico's Gröna Bandet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #111;
      color: white;
      padding: 12px;
      text-align: center;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h2>Federico's Gröna Bandet</h2>
</header>

<div id="map"></div>

<style>
  .stage-table-control {
    background: rgba(255, 255, 255, 0.9);
    padding: 8px;
    border-radius: 5px;
    font-size: 14px;
    max-height: 500px;
    overflow-y: auto;
    box-shadow: 0 0 6px rgba(0,0,0,0.3);
  }
  .stage-table-control table {
    border-collapse: collapse;
    width: 100%;
  }
  .stage-table-control th, 
  .stage-table-control td {
    padding: 4px 6px;
    border: 1px solid #333;
    text-align: left;
  }
  .stage-table-control th {
    background: #eee;
  }
</style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>
  const map = L.map('map');
  map.setView([63.5, 14], 4.5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Colors by main stage number — all stage<N>_* variants share the same color
  const stageColors = {
    1: "red",
    2: "blue",
    3: "yellow",
    4: "#00FF00",
    5: "orange",
    6: "magenta",
  };

  function colorForFile(file) {
    const m = file.match(/stage(\d+)/);
    return m ? (stageColors[parseInt(m[1])] ?? "gray") : "gray";
  }

  function nameForFile(file) {
    // "stage2_alt.3_route.gpx" -> "Stage 2 Alt.3"
    return file
      .replace('_route.gpx', '')
      .replace(/stage(\d+)/, (_, n) => `Stage ${n}`)
      .replace('_alt', ' Alt');
  }

  const GPX_DIR = "gpx/";

  // Route files
  const routes = [
    "stage1.1_route.gpx",
    "stage2.1_route.gpx",
    "stage2.2_route.gpx",
    "stage2.3_route.gpx",
    "stage2.4_route.gpx",
    "stage2.5_route.gpx",
    "stage2.6_route.gpx",
    "stage2.7_route.gpx",
    "stage2_alt.1_route.gpx",
    "stage2_alt.2_route.gpx",
    "stage2_alt.3_route.gpx",
    "stage2_alt.4_route.gpx",
    "stage2_alt.5_route.gpx",
    "stage2_alt.6_route.gpx",
    "stage2_alt.7_route.gpx",
    "stage2_alt.8_route.gpx",
    "stage2_alt.9_route.gpx",
    "stage2_alt.10_route.gpx",
    "stage3.1_route.gpx",
    "stage3.2_route.gpx",
    "stage3.3_route.gpx",
    "stage3.4_route.gpx",
    "stage4.1_route.gpx",
    "stage4.2_route.gpx",
    "stage4.3_route.gpx",
    "stage5.1_route.gpx",
    "stage5.2_route.gpx",
    "stage5.3_route.gpx",
    "stage5.4_route.gpx",
    "stage6.1_route.gpx",
    "stage6.2_route.gpx",
    "stage6.3_route.gpx",
    "stage6.4_route.gpx",
    "stage6.5_route.gpx",
    "stage6.6_route.gpx",
  ].map(file => ({ file: GPX_DIR + file, name: nameForFile(file) }));


  // Resupply waypoint files
  const resupplies = [
    "stage1_resupply.gpx",
    "stage2_resupply.gpx",
    "stage2_alt_resupply.gpx",
    "stage3_resupply.gpx",
    "stage4_resupply.gpx",
    "stage5_resupply.gpx",
  ].map(file => GPX_DIR + file);

  let allBounds = [];

    // Create a Leaflet control for the table
  const StageTableControl = L.Control.extend({
    onAdd: function(map) {
      const div = L.DomUtil.create('div', 'stage-table-control');
      div.innerHTML = `
        <table>
          <thead>
            <tr><th>Stage</th><th>Distance (km)</th></tr>
          </thead>
          <tbody id="stage-table-body"></tbody>
        </table>
      `;
      return div;
    },
    onRemove: function(map) {
      // Nothing to do
    }
  });

  // Add the control to bottom left
  const stageTableControl = new StageTableControl({ position: 'bottomleft' });
  stageTableControl.addTo(map);

  // Reference tbody for appending rows
  const tableBody = document.getElementById("stage-table-body");

  function stageLabel(file) {
    // "gpx/stage2_alt.3_route.gpx" -> "Stage 2 Alt", "gpx/stage3.1_route.gpx" -> "Stage 3"
    const basename = file.split('/').pop();
    return basename
      .replace(/\.\d+_route\.gpx$/, '')
      .replace(/stage(\d+)/, (_, n) => `Stage ${n}`)
      .replace('_alt', ' Alt');
  }

  function renderTable() {
    tableBody.innerHTML = '';
    stageDistances.forEach((km, label) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${label}</td><td>${km.toFixed(1)}</td>`;
      tableBody.appendChild(tr);
    });
  }

  // Accumulated distances keyed by stage label, insertion-ordered
  const stageDistances = new Map();

  // Pre-populate keys in stage order so rows appear in a stable order
  routes.forEach(route => {
    const label = stageLabel(route.file);
    if (!stageDistances.has(label)) stageDistances.set(label, 0);
  });

  // Load routes
  routes.forEach(route => {
    new L.GPX(route.file, {
      async: true,
      polyline_options: {
        color: colorForFile(route.file),
        weight: 4,
        opacity: 0.9
      },
      markers: { startIcon: null, endIcon: null, shadowIcon: null }
    })
    .on('loaded', function(e) {
      allBounds.push(e.target.getBounds());
      fitMap();
      const label = stageLabel(route.file);
      stageDistances.set(label, stageDistances.get(label) + e.target.get_distance() / 1000);
      renderTable();
    })
    .addTo(map);
  });


  // Load resupply points
  resupplies.forEach(file => {
    new L.GPX(file, {
      async: true,
      polyline_options: { opacity: 0 } // hide lines
    })
    .on('addpoint', function(e) {
      const marker = e.point;
      const title = marker.options.title || "Resupply Point";
      const descEl = e.element.getElementsByTagName('desc');
      const desc = descEl.length > 0 ? descEl[0].textContent : '';
      marker.bindPopup(`<strong>Name:</strong> ${title}` + (desc ? `<br><strong>Info:</strong> ${desc}` : ''));
    })
    .on('loaded', function(e) {
      allBounds.push(e.target.getBounds());
      fitMap();
    })
    .addTo(map);
  });

  function fitMap() {
    if (allBounds.length === routes.length + resupplies.length) {
      const group = L.featureGroup(
        allBounds.map(b => L.rectangle(b))
      );
      map.fitBounds(group.getBounds());
    }
  }
</script>

</body>
</html>
