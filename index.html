<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Federico's Gröna Bandet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #111;
      color: white;
      padding: 12px;
      text-align: center;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h2>Federico's Gröna Bandet</h2>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>
  const map = L.map('map');
  map.setView([62.5, 13], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // -------------------------
  // ROUTE FILES (COLORED)
  // -------------------------

  const routes = [
    { file: "stage1_route.gpx", color: "red" },
    { file: "stage2_route.gpx", color: "cyan" },
    { file: "stage2_alt_route.gpx", color: "cyan" },
    { file: "stage3_route.gpx", color: "yellow" },
    { file: "stage4_route.gpx", color: "#00FF00" },
    { file: "stage5_route.gpx", color: "orange" },
    { file: "stage6_route.gpx", color: "magenta" },
  ];

  // -------------------------
  // RESUPPLY FILES (MARKERS)
  // -------------------------

  const resupplies = [
    "stage1_resupply.gpx",
    "stage2_resupply.gpx",
    "stage2_alt_resupply.gpx",
    "stage3_resupply.gpx",
    "stage4_resupply.gpx",
    "stage5_resupply.gpx",
    "stage6_resupply.gpx",
  ];

  let allBounds = [];

  // ---- Load Routes ----
  routes.forEach(route => {
    new L.GPX(route.file, {
      async: true,

      polyline_options: {
        color: route.color,
        weight: 4,
        opacity: 0.9
      },

      // 🔥 Completely disable all markers
      markers: {
        startIcon: null,
        endIcon: null,
        shadowIcon: null
      }
    })
    .on('loaded', function(e) {
      allBounds.push(e.target.getBounds());
      fitMap();
    })
    .addTo(map);
  });


  // ---- Load Resupply Waypoints ----
  resupplies.forEach(file => {
    new L.GPX(file, {
      async: true,
      polyline_options: { opacity: 0 } // hide lines
    })
    .on('addpoint', function(e) {
      const marker = e.point;
      const title = marker.options.title || "Resupply Point";

      // Popup only uses name
      marker.bindPopup(`<strong>${title}</strong>`);
    })
    .on('loaded', function(e) {
      allBounds.push(e.target.getBounds());
      fitMap();
    })
    .addTo(map);
  });

  function fitMap() {
    if (allBounds.length === routes.length + resupplies.length) {
      const group = L.featureGroup(
        allBounds.map(b => L.rectangle(b))
      );
      map.fitBounds(group.getBounds());
    }
  }
</script>

</body>
</html>
